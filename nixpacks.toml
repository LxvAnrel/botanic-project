[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo_pgsql", "php83Extensions.pgsql", "php83Extensions.mbstring", "php83Extensions.xml", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.tokenizer", "php83Extensions.fileinfo", "composer"]

[phases.build]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm ci && npm run build"
]

[start]
cmd = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache/data storage/logs; php artisan storage:link --force 2>/dev/null; php artisan migrate --force; php artisan db:seed --class=PlantSeeder --force 2>/dev/null; php artisan schedule:work & php artisan serve --host=0.0.0.0 --port=$PORT"
